name: Publish Dev Container Image

on:
  workflow_dispatch:

jobs:
  build:
    environment: release
    runs-on: ubuntu-22.04
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v7

      - name: Login to Github
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build image
        run: |
          cd container/dev
          sh build.sh

          docker push ghcr.io/stjude/devcontainer:latest
