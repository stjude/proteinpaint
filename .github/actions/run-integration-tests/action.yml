name: 'Run integration tests'
description: 'Runs integration tests inside Docker and posts results to Slack'

inputs:
  TOKEN:
    description: 'GitHub Token'
    required: true

  SLACK_WEBHOOK_URL:
    description: 'Slack webhook for posting test results'
    required: true

runs:
  using: 'composite'
  steps:
    - uses: actions/setup-node@v6
      with:
        cache: 'npm'
        node-version: '24'

    - name: Install PP packages
      shell: bash
      env:
        PUPPETEER_SKIP_DOWNLOAD: 'true'
      run: |
        npm ci

    - name: Prepare for Docker build
      shell: bash
      run: |
        cd ./container
        ./pack.sh

    - name: Copy serverconfig.json to root
      shell: bash
      run: |
        cp container/ci/serverconfig.json container/

    - name: Create cache folder
      shell: bash
      run: mkdir cache

    - name: Install Google Chrome for Puppeteer
      shell: bash
      run: | # pragma: allowlist secret
        # Install Google Chrome so Puppeteer can use a system Chrome binary
        # pragma: allowlist secret
        wget -q -O - https://dl-ssl.google.com/linux/linux_signing_key.pub | sudo apt-key add -
        echo "deb [arch=amd64] http://dl.google.com/linux/chrome/deb/ stable main" | sudo tee /etc/apt/sources.list.d/google-chrome.list
        sudo apt-get update
        sudo apt-get install -y google-chrome-stable
        echo "PUPPETEER_EXECUTABLE_PATH=/usr/bin/google-chrome-stable" >> $GITHUB_ENV

    - name: Login to Github
      uses: docker/login-action@v3.4.0
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ inputs.TOKEN }}

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build Docker Image
      uses: docker/build-push-action@v7
      env:
        DOCKER_BUILD_SUMMARY: false
        DOCKER_BUILD_RECORD_UPLOAD: false
        BUILDX_METADATA_PROVENANCE: disabled
      with:
        context: ./container/
        file: ./container/server/Dockerfile
        tags: ppserver:latest
        platforms: linux/amd64
        outputs: type=docker
        cache-from: type=gha
        cache-to: type=gha,mode=max
        provenance: false
        sbom: false

    - name: Run local server and integration tests
      id: integration
      shell: bash
      env:
        PUPPETEER_EXECUTABLE_PATH: /usr/bin/google-chrome-stable
      run: |
        set -e
        cd ./container
        ./run.sh ppserver:latest
        sleep 10
        cd ..
        # Run integration tests using headless Chrome (no X server / xvfb required)
        npm run test:integration
      continue-on-error: true

    - name: Check if integration tests passed
      id: check-tests
      shell: bash
      run: |
        # client/test/puppet.js emits the passedTests.txt file
        if [ -f ./client/passedTests.txt ]; then
          echo "INTEGRATION_TEST_PASSED=true" >> "$GITHUB_ENV"
        fi

    - name: Get current time
      id: current-time
      if: always()
      shell: bash
      run: |
        echo "formattedTime=$(TZ=America/Chicago date '+%b %d, %Y %H:%M:%S')" >> "$GITHUB_OUTPUT"

    - name: Set short git commit SHA
      id: vars
      if: always()
      shell: bash
      run: echo "SHORT_SHA=$(git rev-parse --short ${{ github.sha }})" >> $GITHUB_ENV

    - name: Post build results on Slack
      if: always()
      uses: slackapi/slack-github-action@v1.23.0
      with:
        payload: |
          {
            "status": "${{ env.INTEGRATION_TEST_PASSED == 'true' && 'success' || 'failure' }} - https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}",
            "commit": "${{ env.SHORT_SHA }}",
            "date-time": "${{ steps.current-time.outputs.formattedTime }}"
          }
      env:
        SLACK_WEBHOOK_URL: ${{ inputs.SLACK_WEBHOOK_URL }}

    - name: Fail job if integration test failed
      if: env.INTEGRATION_TEST_PASSED != 'true'
      shell: bash
      run: exit 1
