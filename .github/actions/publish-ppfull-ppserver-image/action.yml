name: 'Publish Docker Image'
description: 'Build and publish Docker image to GitHub Container Registry.'
inputs:
  PAT:
    description: 'personal access token'
    required: true
  TOKEN:
    description: 'github token'
    required: true
  GITHUB_ACTOR:
    description: 'github_actor'
    required: true
runs:
  using: 'composite'
  steps:
    - uses: actions/checkout@v7
      with:
        fetch-depth: 10

    - name: Login to Github
      uses: docker/login-action@v4
      with:
        registry: ghcr.io
        username: ${{ inputs.GITHUB_ACTOR }}
        password: ${{ inputs.TOKEN }}

    - name: Build and Publish Docker Images
      id: docker-publish
      shell: bash
      run: |
        sleep 90   # give npmjs registry enough time to be ready with the newly published packages (check if this delay is still needed)

        # set the branch name before checking out tag
        BRANCH=$(git rev-parse --abbrev-ref HEAD)
        echo "branch=$BRANCH" >> "$GITHUB_OUTPUT"

        git pull origin $BRANCH # in case this action is not able to access a pushed tagged commit/branch tip from a previous step within the CI environment
        
        # should detect and pull latest tag in branch and build from it,
        # and avoid building from branch HEAD/tip that may have already moved
        TAG="v$(node -p "require('./package.json').version")"
        git fetch --tags --quiet origin $TAG # always use tagged commit for build 
        git checkout $TAG

        cd container;
        ./build2.sh -r "ghcr.io/stjude/" server;
        TAG="$(node -p "require('./server/package.json').version")";
        HASH="$(git rev-parse --short HEAD)";
        docker push "ghcr.io/stjude/ppserver:$TAG-$HASH";
        
        ./build2.sh -r "ghcr.io/stjude/" full;
        TAG="$(node -p "require('./full/package.json').version")";
        docker push "ghcr.io/stjude/ppfull:$TAG-$HASH";

        if [[ "$BRANCH" == "master" ]]; then
          docker push "ghcr.io/stjude/ppserver:latest";
          docker push "ghcr.io/stjude/ppfull:latest";
        fi

        echo "docker_version=$TAG-$HASH" >> "$GITHUB_OUTPUT"

    # Reads versions inline with node (repo's existing idiom), replacing the
    # third-party martinbeentjes/npm-get-version-action@main (mutable @main branch pin).
    - name: Get package versions
      id: versions
      shell: bash
      run: |
        echo "pp_version=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"
        echo "front_version=$(node -p "require('./front/package.json').version")" >> "$GITHUB_OUTPUT"
        echo "server_version=$(node -p "require('./server/package.json').version")" >> "$GITHUB_OUTPUT" 

    # Trigger the downstream deploy in stjude/sj-pp via a repository_dispatch event.
    # Replaces peter-evans/repository-dispatch@v4: its bundled @octokit/request@8.4.1
    # tags string bodies with duplex:"half", which Node 24's undici rejects as
    # "Request body length does not match content-length header".
    - name: Trigger deploy in sj-pp
      # Only fire on non-release branches (release/prerelease deploys are handled elsewhere).
      if: ${{ !startsWith(github.ref_name, 'release') && !startsWith(github.ref_name, 'prerelease') }}
      uses: actions/github-script@v9
      with:
        # PAT (not the default GITHUB_TOKEN) — we dispatch to a DIFFERENT repo,
        # and GITHUB_TOKEN has no cross-repo permissions.
        github-token: ${{ inputs.PAT }}
        script: |
          // octokit needs owner and repo as SEPARATE fields — it won't accept a
          // combined "stjude/sj-pp" string, so both lines must stay.
          await github.rest.repos.createDispatchEvent({
            owner: 'stjude',
            repo: 'sj-pp',
            event_type: 'version-update',
            // client_payload must be an OBJECT (not a JSON string); octokit serializes it
            // and computes Content-Length from its own output, so no mismatch can occur.
            // toJSON() safely quotes/escapes each interpolated value.
            client_payload: {
              pp_version: ${{ toJSON(steps.versions.outputs.pp_version) }},
              front_version: ${{ toJSON(steps.versions.outputs.front_version) }},
              server_version: ${{ toJSON(steps.versions.outputs.server_version) }},
              docker_version: ${{ toJSON(steps.docker-publish.outputs.docker_version) }},
              branch: ${{ toJSON(steps.docker-publish.outputs.branch) }}
            }
          })

